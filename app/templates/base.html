<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Beach App{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #1a3c5e;
        }
        .sidebar a, .sidebar .nav-link {
            color: #cce0f5;
        }
        .sidebar a:hover, .sidebar .nav-link:hover {
            color: #ffffff;
        }
        .sidebar .active {
            color: #ffffff;
            font-weight: bold;
        }
        .year-header {
            cursor: pointer;
            padding: 8px 16px;
            color: #cce0f5;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .year-header:hover {
            color: #ffffff;
        }
        .year-submenu {
            padding-left: 20px;
        }
        .countdown-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #1a3c5e;
        }
        [data-bs-theme="dark"] .countdown-number {
            color: #7db8e0;
        }
        .countdown-label {
            font-size: 0.9rem;
            color: #6c757d;
        }
        .theme-toggle {
            cursor: pointer;
            background: none;
            border: none;
            color: #cce0f5;
            font-size: 1.1rem;
        }
        .theme-toggle:hover {
            color: #ffffff;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    (function() {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', saved);
        function updateIcons(theme) {
            document.querySelectorAll('.theme-icon').forEach(function(el) {
                el.className = 'bi theme-icon ' + (theme === 'dark' ? 'bi-sun-fill' : 'bi-moon-fill');
            });
        }
        updateIcons(saved);
        document.addEventListener('click', function(e) {
            if (e.target.closest('.theme-toggle')) {
                var current = document.documentElement.getAttribute('data-bs-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-bs-theme', next);
                localStorage.setItem('theme', next);
                updateIcons(next);
            }
        });
    })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
