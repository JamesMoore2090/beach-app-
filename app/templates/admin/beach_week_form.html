{% extends "layout.html" %}
{% block title %}{{ 'Edit' if beach_week else 'Add' }} Beach Week - Beach App{% endblock %}

{% block content %}
<h2>{{ 'Edit' if beach_week else 'Add' }} Beach Week</h2>
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    {% if not beach_week %}
                    <div class="mb-3">
                        <label for="year" class="form-label">Year</label>
                        <input type="number" class="form-control" id="year" name="year" required>
                    </div>
                    {% endif %}
                    <div class="mb-3">
                        <label for="start_date" class="form-label">Start Date</label>
                        <input type="date" class="form-control" id="start_date" name="start_date"
                               value="{{ beach_week.start_date.isoformat() if beach_week else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="end_date" class="form-label">End Date</label>
                        <input type="date" class="form-control" id="end_date" name="end_date"
                               value="{{ beach_week.end_date.isoformat() if beach_week else '' }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="{{ url_for('admin.admin_home') }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
