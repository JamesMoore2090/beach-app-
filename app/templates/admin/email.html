{% extends "layout.html" %}
{% block title %}Send Email - Beach App{% endblock %}

{% block content %}
<h2>Send Email to All Users</h2>
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="subject" class="form-label">Subject</label>
                        <input type="text" class="form-control" id="subject" name="subject" required>
                    </div>
                    <div class="mb-3">
                        <label for="body" class="form-label">Message</label>
                        <textarea class="form-control" id="body" name="body" rows="6" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Email</button>
                    <a href="{{ url_for('admin.admin_home') }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
