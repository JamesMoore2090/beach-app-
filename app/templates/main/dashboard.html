<!DOCTYPE html>
<html>
<head><title>Dashboard - Beach App</title></head>
<body>
    <h1>Dashboard</h1>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <p>{{ message }}</p>
    {% endfor %}
    {% endif %}
    {% endwith %}
    <p>Welcome to Beach App!</p>
</body>
</html>
