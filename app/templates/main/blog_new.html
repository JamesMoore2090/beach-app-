{% extends "layout.html" %}
{% block title %}New Post - Beach App{% endblock %}
{% block content %}
<h2>New Post</h2>
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">Content</label>
                        <textarea class="form-control" id="content" name="content" rows="6" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="beach_week_id" class="form-label">Beach Week (optional)</label>
                        <select class="form-select" id="beach_week_id" name="beach_week_id">
                            <option value="">None</option>
                            {% for bw in beach_weeks_list %}
                            <option value="{{ bw.id }}">{{ bw.year }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="photos" class="form-label">Photos (optional)</label>
                        <input type="file" class="form-control" id="photos" name="photos" multiple accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary">Post</button>
                    <a href="{{ url_for('main.blog_list') }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
